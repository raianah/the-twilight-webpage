    <style>
        * {
            background-color: transparent;
            scroll-behavior: smooth;
            font-family: 'League Spartan', sans-serif;
        }

        /* Header Section with Dimmed Background */
        .header-section {
            width: 100%;
            height: 800px;
            background: url('./img/splash_main.gif') no-repeat center center/cover;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            color: white;
            position: relative;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            z-index: 1;
            padding-top: 80px;
        }

        /* Overlay to dim the background */
        .header-section::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.767); /* Dark overlay */
            z-index: 1;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        /* Tagline Container on top of the dimmed background */
        .tagline-container {
            max-width: 600px;
            padding-left: 5%;
            position: relative;
            z-index: 2; /* Ensures the text is above the overlay */
            background: none; /* Remove background color */
        }

        .tagline-container h1, 
        .tagline-container p, 
        .tagline-container a {
            color: white; /* Ensure the text is white for readability */
        }

        .tagline-container h1 {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, white, #fdbc58);
            -webkit-background-clip: text; /* For Safari */
            -moz-background-clip: text; /* For Firefox (not widely supported) */
            background-clip: text; /* Standard */
            -webkit-text-fill-color: transparent; /* For Safari */
            color: transparent; /* For other browsers */
        }

        .tagline-container p {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
        }

        .tagline-container a {
            padding: 12px 30px;
            background: linear-gradient(to right, white, #fdbc58); /* Gradient background */
            border: none; /* Remove default border */
            border-radius: 5px;
            font-size: 1.2rem;
            color: black; /* Set text color to white */
            text-decoration: none; /* Remove underline from link */
            display: inline-block; /* Ensures padding works correctly */
            transition: opacity 0.3s ease; /* Smooth transition on hover */
            font-weight: bold;
        }

        .tagline-container a:hover {
            opacity: 0.8; /* Slightly dim on hover */
        }

        /* Navigation Styles */
        nav {
            top: 0;
            width: 100%;
            background-color: transparent;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
        }

        .nav-left,
        .nav-right {
            display: flex;
            align-items: center;
        }

        .nav-left a,
        .nav-right a {
            color: white;
            font-size: 1.2rem;
            text-decoration: none;
        }

        .nav-left a {
            margin-left: 30px;
        }

        .nav-right a {
            margin-right: 30px;
        }

        .nav-left a:hover,
        .nav-right a:hover {
            color: #fdbc58;
        }

        .logo img {
            height: 70px; /* Adjust this as per the desired size */
            display: block;
            margin: 0 auto; /* Centers the image */
        }

        /* Hamburger Menu for Mobile */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            z-index: 20; /* Ensure hamburger menu has higher z-index */
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background-color: white;
            margin: 4px;
            transition: all 0.3s ease;
        }

        /* Mobile Menu Links */
        .nav-links-mobile {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 75px;
            left: 0;
            background-color: #222;
            width: 100%;
            padding: 0;
            z-index: 15;
            opacity: 0;  /* Initially hidden */
            transform: translateY(-20px);  /* Slide up effect */
            transition: opacity 0.3s ease, transform 0.3s ease;  /* Add smooth transition */
            pointer-events: none;  /* Disable clicks when not visible */
        }

        .nav-links-mobile li {
            text-align: center;
            padding: 10px 0;
        }

        .nav-links-mobile a {
            color: white;
            text-decoration: none;
            display: block;
        }

        .nav-links-mobile.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);  /* Slide into view */
            pointer-events: auto;  /* Enable clicks */
            z-index: 15; /* Set higher z-index to make sure it's clickable */
        }

        /* Hamburger Menu active state (X icon) */
        .hamburger.active div:nth-child(1) {
            transform: rotate(45deg) translate(7.5px, 7.5px);
        }

        .hamburger.active div:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active div:nth-child(3) {
            transform: rotate(-45deg) translate(7.5px, -7.5px);
        }

        /* Game Promo Section */
        .section-title {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
            font-weight: bold;
            margin-top: 200px;

            color: transparent; /* Make text transparent */
            background: linear-gradient(to right, white, #fdbc58); /* Gradient background */
            -webkit-background-clip: text; /* For WebKit browsers */
            background-clip: text; /* Standard property */
        }

        .section-title-nw {
            font-size: 60px;
            margin-bottom: 20px;
            font-weight: bold;
            margin-top: 400px;

            color: transparent; /* Make text transparent */
            background: linear-gradient(to right, white, #fdbc58); /* Gradient background */
            -webkit-background-clip: text; /* For WebKit browsers */
            background-clip: text; /* Standard property */
        }

        .game-promo {
            margin: 40px auto;
            margin-bottom: 200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            padding: 0 5%;
            max-width: 1600px;
        }

        .game-card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            flex: 1;
            margin: 0 10px;
            overflow: hidden;
        }

        .game-card:hover {
            transform: scale(1.05);
        }

        .game-card img {
            width: 710px;
            height: 322px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid white; /* Added border-style and combined with color and width */
        }

        .game-card a {
            display: block;
        }

        /* Newswire Section */
        .newswire {
            text-align: center;
            margin: 50px 0;
        }

        .newswire-content {
            display: inline-block;
            text-align: left;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input[type="email"],
        select {
            padding: 10px;
            width: 700px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: transparent;
        }

        .subscribe-btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .subscribe-btn:hover {
            background-color: #0056b3;
        }

        /* Responsive Adjustments */
        @media (max-width: 1024px) {
            nav {
                justify-content: space-between;
                position: fixed;
            }

            .logo img {

            }

            .header-section {

                text-align: center;
            }

            .tagline-container p, 
            .tagline-container a {
                text-align: center;
            }

            .tagline-container a {
                align-items: center;
            }

            .hamburger {
                display: flex;
                margin-right: 10px;
            }

            .logo img {
                margin-left: 20px;
            }

            .nav-left,
            .nav-right {
                display: none;
            }

            .nav-links-mobile {
                position: fixed;
            }

            .section-title {
                margin-left: 50px;
            }

            .game-promo {
                flex-direction: column;
            }

            .game-card {
                margin-bottom: 20px;
            }

            .game-card img {
                width: 100%;
                height: auto;
            }
        }

        .container {
            max-width: 1860px;
            min-height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;

            text-decoration: none;
        }

            text-decoration: underline;
        }
